services:
  pipeline-ubuntu:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: pipeline-ubuntu
    hostname: pipeline-ubuntu
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./ssh-keys/authorized_keys:/home/cadet/.ssh/authorized_keys:ro
    networks:
      pipeline_net:
        ipv4_address: 172.35.0.11
    ports:
      - "2271:22"

  pipeline-rocky:
    build:
      context: .
      dockerfile: Dockerfile.rocky
    container_name: pipeline-rocky
    hostname: pipeline-rocky
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./ssh-keys/authorized_keys:/home/cadet/.ssh/authorized_keys:ro
    networks:
      pipeline_net:
        ipv4_address: 172.35.0.12
    ports:
      - "2272:22"

networks:
  pipeline_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.35.0.0/24
