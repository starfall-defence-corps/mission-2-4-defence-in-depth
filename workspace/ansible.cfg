[defaults]
host_key_checking = False
remote_user = cadet
deprecation_warnings = False
interpreter_python = auto_silent
roles_path = roles

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args = -o UserKnownHostsFile=/dev/null
